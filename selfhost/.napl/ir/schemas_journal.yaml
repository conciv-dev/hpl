module: schemas_journal
deps:
  - text_diff
  - blame
types:
  - name: JournalFile
    description: 'One file touched by a generation. Fields: path (string), patch (string, unified diff text), hash_before (optional string, serialized as "hashBefore", absent/null for newly created files), hash_after (string, serialized as "hashAfter"). Structural equality, cloneable, serializable to/from JSON with the given field renames.
'
  - name: JournalMode
    description: 'Enum of the mode a generation ran in: Full, Incremental, Reconcile. Serializes to/from lowercase strings "full", "incremental", "reconcile". Copyable, structural equality.
'
  - name: JournalEntry
    description: "One generation record. Fields: gen (integer, 1-based generation number), timestamp (string), module (string, non-empty when valid), target (string, non-empty when valid), prompt_hash (string, serialized as \"promptHash\"), prompt_diff (string, serialized as \"promptDiff\"), mode (JournalMode), files (list of JournalFile, defaults to empty list when absent from JSON, each file's path non-empty when valid). Structural equality, cloneable, serializable to/from JSON.\n"
functions:
  - name: file_patch
    signature: "file_patch(before: Option<String>, after: String) -> String"
    behavior: "Returns the unified diff between `before` and `after`. When `before` is absent (None/null), treats the \"before\" text as the empty string (i.e. represents a newly created file). Delegates the actual diff computation to the text_diff module's unified_diff function; does not reimplement diffing.\n"
  - name: read_journal_str
    signature: "read_journal_str(raw: String) -> (entries: List<JournalEntry>, warnings: List<String>)"
    behavior: "Parses raw JSONL journal text (no I/O — text is already in memory) and returns the list of valid entries plus a list of warning strings, one per skipped line, in encounter order.\nSplits input on '\\n' into lines, tracking a 1-based line number for each; strips a trailing '\\r' from each line before processing.\nFor each line: - If the line is empty/whitespace-only, it is skipped silently (no\n  entry, no warning).\n- Otherwise the line is first checked for syntactic JSON validity. If\n  it is not valid JSON at all, a warning of the exact form\n  \"journal: skipping corrupt line {n} (invalid JSON)\" is emitted\n  (byte-exact, no entry produced) and processing moves to the next\n  line.\n- If the line is syntactically valid JSON, it is deserialized as a\n  JournalEntry and validated (see validation rule below). If\n  deserialization fails or validation fails, a warning of the form\n  \"journal: skipping corrupt line {n} ({reason})\" is emitted, where\n  {reason} is the deserialize error message or a validation-failure\n  reason; no entry is produced for that line.\n- Otherwise (valid JSON, deserializes cleanly, passes validation),\n  the resulting JournalEntry is appended to the returned entries\n  list.\n\nValidation rule (applied to a successfully-deserialized entry): an entry is invalid (and thus rejected with a warning, never appearing in the returned entries) if any of: gen < 1; module is empty; target is empty; or any file in files has an empty path.\nPrecondition: none — any string input, including malformed or binary garbage, is handled without panicking. Postcondition: entries contains only valid JournalEntry values in original line order; warnings.length equals the number of skipped non-blank lines, in original line order; the function performs no I/O.\n"
  - name: next_gen_number
    signature: "next_gen_number(entries: List<JournalEntry>) -> Integer"
    behavior: "Returns one greater than the maximum `gen` value found among `entries`. Returns 1 when `entries` is empty. Does not mutate input.\n"
  - name: file_history
    signature: "file_history(entries: List<JournalEntry>, file_path: String) -> List<BlameSourceEntry>"
    behavior: "Scans `entries` in order; for each entry that contains a file whose `path` equals `file_path`, produces one BlameSourceEntry carrying that entry's gen, timestamp, and module, together with the matching file's patch and the entry's prompt_diff. Entries with no matching file contribute nothing. Result preserves the relative order of the source entries and is empty when no entry touches `file_path`. When an entry contains more than one file with a matching path, only one BlameSourceEntry is produced per entry (the first match).\n"
tests:
  - name: journal_file_serde_field_names
    given: 'A JournalFile with hash_before = Some("h1"), hash_after = "h2", serialized to JSON.
'
    expect: 'The JSON object has keys "hashBefore" = "h1" and "hashAfter" = "h2"; deserializing that JSON back produces an equal JournalFile.
'
  - name: journal_mode_serializes_lowercase
    given: JournalMode::Full, ::Incremental, ::Reconcile serialized to JSON.
    expect: 'Produces the JSON strings "full", "incremental", "reconcile" respectively.
'
  - name: journal_entry_field_names_and_default_files
    given: 'A JSON object with gen, timestamp, module, target, "promptHash", "promptDiff", "mode" set but no "files" key.
'
    expect: "Deserializes successfully; prompt_hash/prompt_diff/mode map from the renamed JSON fields correctly, and files defaults to an empty list.\n"
  - name: file_patch_treats_none_as_empty_before
    given: file_patch(None, "line one\n") and file_patch(Some("old\n"), "new\n")
    expect: 'Both equal calling text_diff::unified_diff directly with "" (for the None case) or "old\n" (for the Some case) as before, and the given after text.
'
  - name: read_journal_str_skips_blank_lines_silently
    given: raw text "\n\n   \n" (all-blank lines)
    expect: Empty entries list and empty warnings list.
  - name: read_journal_str_warns_on_invalid_json
    given: raw text "not json at all"
    expect: 'Empty entries; exactly one warning equal to "journal: skipping corrupt line 1 (invalid JSON)".
'
  - name: read_journal_str_warns_on_failed_validation
    given: "A single JSON line that is syntactically valid JSON and matches the JournalEntry shape but has gen = 0 (invalid per validation rule).\n"
    expect: 'Empty entries; exactly one warning starting with "journal: skipping corrupt line 1 (".
'
  - name: read_journal_str_rejects_empty_module_target_or_file_path
    given: "Three otherwise-valid entry JSON lines, each with exactly one of module, target, or the sole file's path set to empty string.\n"
    expect: "For each case, entries is empty and warnings has exactly one entry.\n"
  - name: read_journal_str_accepts_valid_entries_and_strips_cr
    given: 'A valid serialized JournalEntry (gen=1) followed by "\r\n\r\n" (trailing CR and blank lines).
'
    expect: "One entry returned with gen == 1; no warnings.\n"
  - name: read_journal_str_line_numbers_are_one_based_and_mixed
    given: 'Raw text: valid entry line, then "not json", then the same valid entry line again (3 lines total).
'
    expect: 'Two entries returned; exactly one warning, equal to "journal: skipping corrupt line 2 (invalid JSON)".
'
  - name: next_gen_number_empty_is_one
    given: An empty entries list.
    expect: Returns 1.
  - name: next_gen_number_is_one_past_max
    given: Entries with gen values [1, 3, 2].
    expect: Returns 4.
  - name: file_history_collects_matching_files_in_order
    given: 'Three entries (gen 1, 2, 3): entry 1 and entry 3 each have a file with path "hash/src/lib.rs" (distinct patch text "patch-one" and "patch-three"); entry 2 has a file with a different path.
'
    expect: 'file_history for "hash/src/lib.rs" returns exactly 2 BlameSourceEntry values, in order: first with gen 1 and patch "patch-one", second with gen 3 and patch "patch-three".
'
  - name: file_history_empty_when_no_entry_touches_file
    given: A single entry whose file path does not match "nonexistent.rs".
    expect: file_history returns an empty list.
