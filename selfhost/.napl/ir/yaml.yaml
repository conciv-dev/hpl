module: yaml
deps:
  - schemas_line_range
  - schemas_attribution
  - schemas_ir
  - schemas_ml
types:
  - name: Yaml
    description: "Value model for a YAML node, used to build documents before rendering. Variants: Null; Bool(bool); Int(i64); Float(f64); Str(String); Seq(list of Yaml, ordered); Map(ordered list of (String key, Yaml value) pairs preserving insertion order). Derives Debug, Clone, PartialEq."
functions:
  - name: to_yaml_document
    signature: "to_yaml_document(node: &Yaml) -> String"
    behavior: Renders a whole YAML value as a document string ending with a trailing newline. Non-empty Map renders as block mapping entries at indent 0; empty Map renders inline as "{}". Non-empty Seq renders as block sequence items at indent 0; empty Seq renders inline as "[]". Any scalar node renders as its single scalar line. Body lines are joined with "\n" and a final "\n" is appended.
  - name: line_range
    signature: "line_range(range: LineRange) -> Yaml"
    behavior: Builds Yaml::Seq([Int(range.start), Int(range.end)]) from an inclusive 1-based LineRange, converting both u32 endpoints to Int.
  - name: attribution_to_yaml
    signature: "attribution_to_yaml(attribution: &Attribution) -> String"
    behavior: Renders an Attribution as a YAML document Map with keys in order module (string), target (string), entries (sequence of Maps, each with keys promptLines = line_range(prompt_lines), file (string), lines = line_range(lines), note (string), in that order). Byte-for-byte matches eemeli/yaml block-style output for this shape.
  - name: ml_to_yaml
    signature: "ml_to_yaml(ml: &Ml) -> String"
    behavior: 'Renders an Ml as a YAML document Map with keys module, target, entries (in order). Each entry is a Map with keys promptLines = line_range(prompt_lines), kind (Ambiguity->"ambiguity", Assumption->"assumption", Note->"note", NoOp->"no-op"), message, reasoning, and suggestion included only when Some. Empty entries list renders inline as entries: [].'
  - name: ir_to_yaml
    signature: "ir_to_yaml(ir: &Ir) -> String"
    behavior: Renders an Ir as a YAML document Map with keys module (string), deps (sequence of strings), types (sequence of Maps with name/description), functions (sequence of Maps with name/signature/behavior), tests (sequence of Maps with name, given, expect, where given/expect are each converted from serde_json::Value via json_to_yaml). Empty sequences render inline as [].
  - name: json_to_yaml
    signature: "json_to_yaml(value: &serde_json::Value) -> Yaml"
    behavior: "Converts a serde_json::Value to the Yaml value model: JSON null -> Null; bool -> Bool; number that is an exact i64 -> Int, otherwise -> Float of its f64 value; string -> Str; array -> Seq of recursively converted items; object -> Map of recursively converted entries, preserving original key insertion order."
  - name: render_string_scalar (string scalar rendering rule)
    signature: "render_string_scalar(s: &str) -> String"
    behavior: "Empty string renders as two double quotes. A non-empty plain-representable string (per the plain-representability rule: no leading/trailing whitespace, no newline/control chars, first char not one of the block/flow indicator chars, leading '-'/'?'/':' must be followed by a non-space second char, no \": \" substring, no trailing ':', no \" #\" substring, and it must not resolve as a core-schema null/bool/int/float literal) renders verbatim unquoted. Otherwise, if it contains a double-quote and no apostrophe, it is wrapped single-quoted with apostrophes doubled. Otherwise it is wrapped double-quoted with \\\", \\\\, \\n, \\t, \\r escaped and other characters passed through."
  - name: render_scalar (non-string scalar rendering rule)
    signature: "render_scalar(node: &Yaml) -> String"
    behavior: 'Non-container Yaml renders to its scalar text: Null -> "null"; Bool -> "true"/"false"; Int -> decimal form; Float -> Rust f64 to_string form; Str -> per the string scalar rendering rule.'
  - name: block map/sequence emission rule
    signature: emit_map/emit_seq(entries_or_items, indent) -> Vec<String>
    behavior: 'Block map emission: for each (key, value) in order, a non-empty Seq or Map value emits "{indent}{key}:" followed by the value rendered as a nested block at indent+2; any other value emits "{indent}{key}: {scalar}" on one line, with empty Seq as [] and empty Map as {}. Block sequence emission: a non-empty Map item is rendered as a nested block at indent+2 then its first line has its indent+2 leading spaces stripped and "{indent}- " prepended, remaining lines unchanged; a non-empty Seq item emits "{indent}-" followed by the inner sequence block at indent+2; any other item emits "{indent}- {scalar}" with the same empty-container inlining rules. Indentation increases by 2 spaces per nesting level.'
tests:
  - name: empty_string_is_double_quoted_empty
    given:
      string_scalar: ""
    expect:
      rendered: '""'
  - name: plain_strings_stay_plain
    given:
      strings:
        - yes
        - on
        - Off
        - no
        - it's fine
        - colon:nospace
        - Returns the string Hello, name!
    expect:
      each_renders_as_itself: true
  - name: non_plain_strings_are_quoted
    given:
      strings:
        - "true"
        - "123"
        - "null"
        - "~"
        - "1.5"
        - "0x10"
        - ".inf"
        - "greet(name: string): string"
        - "a: b"
        - "has # hash"
        - "- dashlead"
        - "end colon:"
        - "#leadinghash"
        - " leadingspace"
        - "trailingspace "
        - "only ' apostrophe: with colon"
    expect:
      each_wrapped_in_double_quotes_verbatim_inside: true
  - name: double_quote_without_apostrophe_becomes_single_quoted
    given:
      string_scalar: '"loudly" is vague'
    expect:
      rendered: "'\"loudly\" is vague'"
  - name: double_quoted_escapes_special_characters
    given:
      string_scalar: "a\nb\tc\rd\\e"
    expect:
      rendered: '"a\nb\tc\rd\\e"'
  - name: double_quoted_escapes_special_characters_with_apostrophe_and_leading_quote
    given:
      string_scalar: "\"hi\" it's ok"
    expect:
      rendered: "\"\\\"hi\\\" it's ok\""
  - name: non_string_scalars_render_directly
    given:
      scalars:
        - "Null"
        - Bool(true)
        - Bool(false)
        - Int(-42)
        - Float(1.5)
    expect:
      rendered:
        - "null"
        - "true"
        - "false"
        - "-42"
        - "1.5"
  - name: document_empty_map_and_seq_are_inline
    given:
      nodes:
        - Map([])
        - Seq([])
    expect:
      documents:
        - "{}\n"
        - "[]\n"
  - name: document_scalar_root
    given:
      nodes:
        - Str("hello")
        - Int(7)
    expect:
      documents:
        - "hello\n"
        - "7\n"
  - name: document_flat_map
    given:
      map:
        a: x
        b: 3
    expect:
      document: "a: x\nb: 3\n"
  - name: document_nested_seq_of_maps
    given:
      map:
        items:
          - k: 1
          - k: 2
    expect:
      document: "items:\n  - k: 1\n  - k: 2\n"
  - name: document_seq_of_seq
    given:
      seq:
        -
          - 1
          - 2
    expect:
      document: "-\n  - 1\n  - 2\n"
  - name: attribution_matches_expected_bytes
    given:
      module: greeting
      target: typescript
      entries:
        - promptLines:
            - 1
            - 1
          file: greet.ts
          lines:
            - 1
            - 1
          note: builds the greeting string
    expect:
      document: "module: greeting\ntarget: typescript\nentries:\n  - promptLines:\n      - 1\n      - 1\n    file: greet.ts\n    lines:\n      - 1\n      - 1\n    note: builds the greeting string\n"
  - name: ml_empty_entries_render_inline
    given:
      module: m
      target: t
      entries: []
    expect:
      document: "module: m\ntarget: t\nentries: []\n"
  - name: ml_entry_kinds_and_optional_suggestion
    given:
      kinds_map:
        Ambiguity: ambiguity
        Assumption: assumption
        Note: note
        NoOp: no-op
      suggestion_present_iff: Some(...)
    expect:
      kind_field_matches_lowercase_or_hyphenated_string: true
      suggestion_field_present_only_when_some: true
