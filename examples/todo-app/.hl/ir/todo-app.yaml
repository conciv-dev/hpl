module: todo-app
deps: []
types:
  - name: Todo
    description: >
      A single todo item with a unique id, its text content, and a done
      (completed) boolean state.
  - name: Filter
    description: >
      Enumeration of visibility filters for the todo list: "all", "active" (not
      done), or "completed" (done).
functions:
  - name: App
    signature: () -> UIComponent
    behavior: >
      Root component. Holds the list of todos and current filter as state.
      Renders a text input, a filter control, the filtered list of todos, and a
      remaining-items counter. On add, appends a new todo with done=false to the
      list. On toggle, flips the done state of the todo matching the given id.
      On delete, removes the todo matching the given id. The visible list is
      derived by applying the current filter (all: unchanged, active: only
      not-done, completed: only done). The remaining count is the number of
      not-done todos, rendered with "item"/"items" pluralization based on
      whether the count equals 1.
  - name: TodoInput
    signature: "(onAdd: (text: string) -> void) -> UIComponent"
    behavior: >
      Renders a text input with placeholder "What needs to be done?". Tracks
      current input value. On Enter keypress, trims the value; if the trimmed
      result is empty, does nothing; otherwise calls onAdd with the trimmed text
      and clears the input.
  - name: TodoList
    signature: "(todos: Todo[], onToggle: (id: string) -> void, onDelete: (id:
      string) -> void) -> UIComponent"
    behavior: >
      Renders the given todos as a list, one TodoItem per todo, passing through
      the toggle and delete callbacks.
  - name: TodoItem
    signature: "(todo: Todo, onToggle: (id: string) -> void, onDelete: (id: string)
      -> void) -> UIComponent"
    behavior: >
      Renders a checkbox reflecting todo.done (labeled "Toggle {text}") that
      invokes onToggle(todo.id) on change; the todo's text, shown with a
      strikethrough/"done" visual style when todo.done is true; and a delete
      button (labeled "Delete {text}") that invokes onDelete(todo.id).
  - name: FilterControl
    signature: "(filter: Filter, onFilterChange: (filter: Filter) -> void) -> UIComponent"
    behavior: >
      Renders three buttons labeled "All", "Active", "Completed" corresponding
      to the three Filter values. The button matching the current filter is
      visually marked active. Clicking a button calls onFilterChange with that
      button's filter value.
tests:
  - name: adds a todo on Enter, trims whitespace, and clears the input
    given: user types "  Buy milk  " followed by Enter into the todo input
    expect: >
      a todo with text "Buy milk" (trimmed) appears in the list and the input is
      empty afterward
  - name: ignores empty or whitespace-only input
    given: user types "   " (whitespace only) followed by Enter
    expect: no todo item is added to the list
  - name: toggles a todo's done state and shows strikethrough
    given: a todo "Walk the dog" has been added
    expect: >
      initially its text has no "done" styling; clicking its toggle checkbox
      applies "done" styling and checks the checkbox; clicking again removes the
      "done" styling
  - name: deletes a todo
    given: a todo "Read a book" has been added
    expect: |
      clicking its delete button removes "Read a book" from the list
  - name: filters todos between All, Active, and Completed and indicates the active
      filter
    given: |
      todos "Active task" (not done) and "Done task" (marked done) exist
    expect: >
      "All" is active by default and shows both todos; clicking "Active" marks
      it active and shows only "Active task"; clicking "Completed" marks it
      active and shows only "Done task"; clicking "All" again shows both todos
  - name: shows a remaining-items counter for active todos
    given: >
      starting with no todos, then adding "Task one" and "Task two", then
      toggling each done one at a time
    expect: >
      counter reads "0 items left" with no todos, "2 items left" after adding
      both, "1 item left" after completing one, and "0 items left" after
      completing both
